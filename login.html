<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RH Manager — Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-brand">RH Manager</div>
            <p class="login-sub">Entre com suas credenciais para acessar o painel</p>

            <form id="login-form">
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" required placeholder="seuemail@empresa.com">
                </div>
                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" id="login-btn" class="btn-primary" style="margin-top: 8px;">
                    Entrar
                </button>
            </form>

            <p style="text-align: center; font-size: 12px; color: #bcc5d4; margin-top: 28px;">
                © 2026 RH Manager &mdash; Sistema Integrado de RH
            </p>
        </div>
    </div>

    <script type="module" src="auth.js"></script>
</body>
</html>
