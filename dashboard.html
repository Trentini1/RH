<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RH Manager - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <h2>Painel Admin RH</h2>
        <div class="user-info">
            <span id="user-email"></span>
            <button id="logout-btn">Sair</button>
        </div>
    </nav>

    <div class="dashboard-content">
        <section class="admin-section">
            <h3>Cadastrar Novo Funcionário</h3>
            <form id="add-user-form" class="card-form">
                <div class="input-group">
                    <label>Nome Completo</label>
                    <input type="text" id="new-name" required>
                </div>
                <div class="input-group">
                    <label>E-mail (Login)</label>
                    <input type="email" id="new-email" required>
                </div>
                <div class="input-group">
                    <label>Senha Provisória</label>
                    <input type="password" id="new-password" required minlength="6">
                </div>
                <div class="input-group">
                    <label>Cargo/Função</label>
                    <input type="text" id="new-role" required>
                </div>
                <div class="input-group">
                    <label>Salário</label>
                    <input type="number" id="new-salary" step="0.01" required>
                </div>
                <div class="input-group">
                    <label>Endereço</label>
                    <input type="text" id="new-address" required>
                </div>
                <div class="input-group">
                    <label>Horário de Entrada</label>
                    <input type="time" id="new-entry-time" required>
                </div>
                <div class="input-group">
                    <label>Horário de Saída</label>
                    <input type="time" id="new-exit-time" required>
                </div>
                <div class="input-group">
                    <label>Início do Almoço</label>
                    <input type="time" id="new-lunch-start" required>
                </div>
                <div class="input-group">
                    <label>Fim do Almoço</label>
                    <input type="time" id="new-lunch-end" required>
                </div>
                <div class="input-group">
                    <label>Data de Entrada</label>
                    <input type="date" id="new-start-date" required>
                </div>
                <button type="submit" id="add-btn">Cadastrar Funcionário</button>
            </form>
        </section>

        <section class="admin-section">
            <h3>Ações Futuras</h3>
            <p>Em breve: Lançamento de Holerites e Fechamento de Ponto.</p>
        </section>
    </div>
    <script type="module" src="admin.js"></script>
</body>
</html>
